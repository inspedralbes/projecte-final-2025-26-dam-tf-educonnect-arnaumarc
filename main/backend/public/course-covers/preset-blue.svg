<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='400' viewBox='0 0 1600 400'>
  <defs>
    <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0' stop-color='#2563eb'/>
      <stop offset='1' stop-color='#06b6d4'/>
    </linearGradient>
    <filter id='noise' x='-20%' y='-20%' width='140%' height='140%'>
      <feTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='2' stitchTiles='stitch' />
      <feColorMatrix type='saturate' values='.2'/>
      <feComponentTransfer>
        <feFuncA type='table' tableValues='0 0.10'/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width='1600' height='400' fill='url(#g)'/>
  <rect width='1600' height='400' filter='url(#noise)' opacity='.25'/>
  <circle cx='1300' cy='90' r='180' fill='rgba(255,255,255,.14)'/>
  <circle cx='250' cy='320' r='240' fill='rgba(0,0,0,.10)'/>
</svg>
